<!DOCTYPE html>
<html lang="pt-br">
 <head>
      <meta charset="utf-8">
      <title>Automatic Image Slider</title>
      <link rel="stylesheet" href="style.css">
   </head>
   <body>
      <div class="content">
         <div class="images">
            <img src="imgs/homem1.jpg">
            <img src="imgs/homem2.jpg">
            <img src="imgs/mulher.png">
            <img src="imgs/senior.jpg">
            <img src="imgs/cachorro.jpg">
         </div>
      </div>
      <script>
         var indexValue = 0;
         function slideShow(){
           setTimeout(slideShow, 2500);
           var x;
           const img = document.querySelectorAll("img");
           for(x = 0; x < img.length; x++){
             img[x].style.display = "none";
           }
           indexValue++;
           if(indexValue > img.length){indexValue = 1}
           img[indexValue -1].style.display = "block";
         }
         slideShow();
      </script>
   </body>
</html>
